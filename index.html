<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geovana | Eternal</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff3385;
            --glass: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            color: #fff;
        }

        /* Fundo Animado (Corações Cinema) */
        .bg-animate {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* Container Principal com Efeito Glassmorphism */
        .main-card {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 420px;
            padding: 40px 30px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.1);
            text-align: center;
            animation: fadeIn 1.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .nome-destaque {
            font-family: 'Dancing Script', cursive;
            font-size: 4rem;
            margin-bottom: 20px;
            background: linear-gradient(to bottom, #ffffff, #ffe4ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1));
        }

        .carta-content {
            font-size: 1.1rem;
            line-height: 1.8;
            font-weight: 300;
            margin-bottom: 30px;
            color: rgba(255, 255, 255, 0.95);
        }

        .destaque-romantico {
            display: block;
            margin-top: 15px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        /* Player Spotify Minimalista */
        .spotify-container {
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 30px;
            border: 1px solid var(--glass-border);
        }

        /* Contador Estilo High-Tech */
        .timer-section {
            background: rgba(0, 0, 0, 0.1);
            padding: 20px;
            border-radius: 20px;
        }

        .timer-label {
            font-size: 0.7rem;
            letter-spacing: 3px;
            opacity: 0.8;
            margin-bottom: 10px;
            display: block;
        }

        #timer {
            font-size: 1.4rem;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

    </style>
</head>
<body>

    <div class="bg-animate" id="particles"></div>

    <main class="main-card">
        <h1 class="nome-destaque">Geovana</h1>

        <div class="carta-content">
            <p>Desde 2022, você transformou meu mundo.</p>
            <p>Cada detalhe seu me faz ter certeza que é você.</p>
            <span class="destaque-romantico">Eu te amo infinitamente! 💖</span>
        </div>

        <div class="spotify-container">
            <iframe src="https://open.spotify.com/embed/track/29u99pY9Uv776oX67YI3S2" 
                width="100%" height="80" frameBorder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
            </iframe>
        </div>

        <div class="timer-section">
            <span class="timer-label">TIME TOGETHER</span>
            <div id="timer">0000d 00h 00m 00s</div>
        </div>
    </main>

    <script>
        // Data de Início (Ajustada para o seu marco em 2022)
        const startDate = new Date(2022, 0, 1, 0, 0, 0); 

        function updateTimer() {
            const now = new Date();
            const diff = now - startDate;

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const m = Math.floor((diff / 1000 / 60) % 60);
            const s = Math.floor((diff / 1000) % 60);

            document.getElementById('timer').innerText = 
                `${d}d ${h.toString().padStart(2, '0')}h ${m.toString().padStart(2, '0')}m ${s.toString().padStart(2, '0')}s`;
        }

        setInterval(updateTimer, 1000);
        updateTimer();

        // Efeito Cinema: Partículas Flutuantes
        function createHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.style.position = 'absolute';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = '110vh';
            heart.style.fontSize = Math.random() * 20 + 10 + 'px';
            heart.style.opacity = Math.random() * 0.5;
            heart.style.transition = `transform ${Math.random() * 5 + 5}s linear, opacity 5s`;
            
            document.getElementById('particles').appendChild(heart);

            setTimeout(() => {
                heart.style.transform = `translateY(-120vh) rotate(${Math.random() * 360}deg)`;
            }, 100);

            setTimeout(() => { heart.remove(); }, 8000);
        }
        setInterval(createHeart, 400);
    </script>
</body>
</html>
