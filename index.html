<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Geovana</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #1a1a1a; 
            --envelope-color: #f3f3f3;
            --envelope-flap: #e0e0e0;
            --text-color: #333;
            --accent: #ff3385;
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-color);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            perspective: 1000px; /* Necessário para o efeito 3D da explosão */
        }

        .wrapper {
            position: relative;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .wrapper:hover {
            transform: scale(1.05);
        }

        .envelope {
            position: relative;
            width: 300px;
            height: 200px;
            background-color: var(--envelope-color);
            border-bottom-left-radius: 10px;
            border-bottom-right-radius: 10px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            z-index: 2; /* Mantém o envelope visível */
        }

        .envelope::before {
            content: "";
            position: absolute;
            top: 0;
            z-index: 3;
            border-top: 110px solid var(--envelope-flap);
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            transform-origin: top;
            transition: transform 0.5s 0.3s;
        }

        .envelope::after {
            content: "";
            position: absolute;
            z-index: 3;
            width: 0;
            height: 0;
            border-top: 100px solid transparent;
            border-right: 150px solid var(--envelope-color);
            border-bottom: 100px solid var(--envelope-color);
            border-left: 150px solid var(--envelope-color);
            border-bottom-left-radius: 10px;
            border-bottom-right-radius: 10px;
        }

        .letter {
            position: absolute;
            bottom: 0;
            left: 10px;
            width: 280px;
            height: 180px;
            background: white;
            padding: 20px;
            text-align: center;
            transition: transform 0.6s, height 0.6s;
            z-index: 1;
            box-sizing: border-box;
            border-radius: 5px;
            overflow: hidden;
        }

        .letter h1 {
            font-family: 'Dancing Script', cursive;
            color: var(--accent);
            font-size: 2rem;
            margin: 0 0 10px 0;
        }

        .letter p {
            font-size: 0.85rem;
            line-height: 1.5;
            color: var(--text-color);
            margin: 10px 0;
        }

        .wrapper.open .envelope::before {
            transform: rotateX(180deg);
            z-index: 0;
        }

        .wrapper.open .letter {
            transform: translateY(-130px);
            height: auto;
            min-height: 260px;
            z-index: 4;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            overflow: visible;
        }

        .timer-container {
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px dashed #ddd;
            opacity: 0;
            transition: opacity 0.5s 0.6s;
        }

        .wrapper.open .timer-container {
            opacity: 1;
        }

        #timer {
            font-weight: 600;
            color: var(--accent);
            font-size: 0.8rem;
        }

        .click-hint {
            position: absolute;
            bottom: -40px;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 0.8rem;
            letter-spacing: 1px;
            opacity: 0.7;
            z-index: 5; /* Garante que a dica fique visível */
        }

        /* Efeito de Explosão de Corações */
        .heart-particle {
            position: absolute;
            color: var(--accent);
            font-size: 1.5rem;
            pointer-events: none;
            z-index: 10; /* Garante que os corações explodam na frente */
            animation: explode 1s ease-out forwards;
        }

        @keyframes explode {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--dx), var(--dy)) scale(0);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="wrapper" id="envelopeWrapper">
        <div class="envelope">
            <div class="letter">
                <h1>Geovana</h1>
                <p>Desde 2022, você transformou meu mundo. Cada detalhe seu me faz ter certeza de que você é o amor da minha vida.</p>
                <p><strong>Eu te amo infinitamente! 💖</strong></p>
                
                <div class="timer-container">
                    <span style="font-size: 0.6rem; display: block; margin-bottom: 5px;">NOSSO TEMPO:</span>
                    <div id="timer">0000d 00h 00m 00s</div>
                </div>
            </div>
        </div>
        <div class="click-hint">CLIQUE PARA ABRIR</div>
    </div>

    <script>
        const wrapper = document.getElementById('envelopeWrapper');
        
        wrapper.addEventListener('click', (e) => {
            wrapper.classList.toggle('open');
            if (wrapper.classList.contains('open')) {
                createHeartExplosion(e.clientX, e.clientY);
            }
        });

        // Lógica do Contador (Data: 11/06/2022)
        const startDate = new Date(2022, 5, 11, 0, 0, 0); 

        function updateTimer() {
            const now = new Date();
            const diff = now - startDate;
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const m = Math.floor((diff / 1000 / 60) % 60);
            const s = Math.floor((diff / 1000) % 60);
            document.getElementById('timer').innerText = 
                `${d}d ${h.toString().padStart(2, '0')}h ${m.toString().padStart(2, '0')}m ${s.toString().padStart(2, '0')}s`;
        }

        setInterval(updateTimer, 1000);
        updateTimer();

        // Efeito de Explosão de Corações
        function createHeartExplosion(x, y) {
            const numHearts = 30; // Número de corações na explosão
            for (let i = 0; i < numHearts; i++) {
                const heart = document.createElement('div');
                heart.innerHTML = '❤️';
                heart.classList.add('heart-particle');
                
                // Posição inicial no centro do envelope
                heart.style.left = x + 'px';
                heart.style.top = y + 'px';
                
                // Direção aleatória para a explosão
                const dx = (Math.random() - 0.5) * 300; // Distância horizontal
                const dy = (Math.random() - 0.5) * 300; // Distância vertical
                heart.style.setProperty('--dx', dx + 'px');
                heart.style.setProperty('--dy', dy + 'px');
                
                // Cor aleatória para os corações
                const colors = ['#ff3385', '#ff9a9e', '#fecfef', '#ffffff'];
                heart.style.color = colors[Math.floor(Math.random() * colors.length)];
                
                document.body.appendChild(heart);
                
                // Remove o coração após a animação
                setTimeout(() => {
                    heart.remove();
                }, 1000); // Tempo da animação de explosão
            }
        }
    </script>
</body>
</html>
