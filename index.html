
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geovana ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Montserrat',sans-serif;
    background:linear-gradient(135deg,#ffd6eb,#ffc2e2,#ffb3d9);
    overflow:hidden;
    color:#660033;
}

/* Caixa central */
.container{
    position:relative;
    z-index:2;
    width:90%;
    max-width:380px;
    padding:25px;
    border-radius:20px;
    background:rgba(255,255,255,0.25);
    backdrop-filter:blur(10px);
    box-shadow:0 8px 25px rgba(0,0,0,0.1);
    text-align:center;
}

/* Nome */
h1{
    font-family:'Great Vibes',cursive;
    font-size:3em;
    margin-bottom:10px;
    position:relative;
    display:inline-block;
    animation:respirar 3s ease-in-out infinite;
}

/* brilho passando */
h1::after{
    content:"";
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background:linear-gradient(120deg,transparent,rgba(255,255,255,0.6),transparent);
    animation:brilho 4s infinite;
}

@keyframes brilho{
    0%{left:-100%;}
    50%{left:100%;}
    100%{left:100%;}
}

@keyframes respirar{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.05);}
}

#contador{
    margin:15px 0;
    font-size:0.95em;
}

button{
    background:#99004d;
    color:white;
    border:none;
    padding:8px 20px;
    border-radius:25px;
    cursor:pointer;
    transition:0.3s;
}

button:active{
    transform:scale(0.95);
}

#mensagem{
    margin-top:15px;
    opacity:0;
    transform:translateY(10px);
    transition:all 1s ease;
    font-size:0.95em;
}

/* corações leves */
.heart{
    position:absolute;
    font-size:14px;
    color:rgba(153,0,77,0.4);
    animation:subir linear infinite;
}

@keyframes subir{
    from{transform:translateY(100vh);opacity:0;}
    20%{opacity:1;}
    to{transform:translateY(-10vh);opacity:0;}
}

/* estrelas piscando */
.star{
    position:absolute;
    width:4px;
    height:4px;
    background:white;
    border-radius:50%;
    opacity:0.8;
    animation:pulsar 2s infinite alternate;
}

@keyframes pulsar{
    from{opacity:0.2;}
    to{opacity:1;}
}
</style>
</head>

<body>

<div class="container">
    <h1>Geovana ❤️</h1>
    <div id="contador"></div>
    <button onclick="abrir()">Abrir 💌</button>
    <div id="mensagem">
        Geovana… você é meu lugar favorito no mundo.  
        Cada segundo ao seu lado é o melhor presente da minha vida. 💖
    </div>
</div>

<script>
// CONTADOR
const dataInicio = new Date("2024-01-01");

function atualizar(){
    const agora = new Date();
    const diff = agora - dataInicio;

    const dias = Math.floor(diff/(1000*60*60*24));
    const horas = Math.floor((diff/(1000*60*60))%24);
    const minutos = Math.floor((diff/(1000*60))%60);
    const segundos = Math.floor((diff/1000)%60);

    document.getElementById("contador").innerHTML =
    `${dias} dias • ${horas}h • ${minutos}m • ${segundos}s 💕`;
}
setInterval(atualizar,1000);
atualizar();

// Abrir mensagem
function abrir(){
    const m = document.getElementById("mensagem");
    m.style.opacity="1";
    m.style.transform="translateY(0)";
}

// Corações leves
function criarHeart(){
    const h=document.createElement("div");
    h.classList.add("heart");
    h.innerHTML="❤";
    h.style.left=Math.random()*100+"vw";
    h.style.animationDuration=(Math.random()*5+5)+"s";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),10000);
}
setInterval(criarHeart,800);

// Estrelas fixas
for(let i=0;i<25;i++){
    const s=document.createElement("div");
    s.classList.add("star");
    s.style.top=Math.random()*100+"vh";
    s.style.left=Math.random()*100+"vw";
    document.body.appendChild(s);
}
</script>

</body>
</html>
