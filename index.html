<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geovana & Luiz Felipe ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(180deg, #ffe6f0, #fff0f5);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    text-align: center;
    padding: 20px;
}

.container {
    width: 100%;
    max-width: 420px;
}

h1 {
    font-family: 'Pacifico', cursive;
    font-size: 26px;
    color: #ff4d88;
    margin-bottom: 8px;
}

h2 {
    font-weight: 300;
    font-size: 14px;
    margin-bottom: 20px;
}

.photo {
    width: 100%;
    border-radius: 25px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    margin-bottom: 20px;
}

.counter {
    background: white;
    padding: 20px;
    border-radius: 20px;
    font-size: 18px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    margin-bottom: 20px;
}

.love-text {
    font-size: 14px;
    color: #555;
    line-height: 1.6;
}
</style>
</head>

<body>

<div class="container">

<h1>Geovana & Luiz Felipe ❤️</h1>
<h2>Juntos desde 11/06/2022</h2>

<img src="foto.jpg" class="photo">

<div class="counter" id="contador">
Carregando nosso tempo juntos...
</div>

<div class="love-text">
Cada dia ao seu lado é o melhor capítulo da minha vida.  
Você é meu amor, minha paz e minha felicidade. 💖
</div>

</div>

<script>
function atualizarContador() {
    const dataInicio = new Date("2022-06-11T00:00:00");
    const agora = new Date();

    const diff = agora - dataInicio;

    const dias = Math.floor(diff / (1000 * 60 * 60 * 24));
    const horas = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const minutos = Math.floor((diff / (1000 * 60)) % 60);
    const segundos = Math.floor((diff / 1000) % 60);

    document.getElementById("contador").innerHTML =
        dias + " dias<br>" +
        horas + " horas<br>" +
        minutos + " minutos<br>" +
        segundos + " segundos 💖";
}

setInterval(atualizarContador, 1000);
atualizarContador();
</script>

</body>
</html>
