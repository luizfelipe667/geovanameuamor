<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geovana ❤️ Felipe</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    color: white;
    overflow: hidden;
    background: linear-gradient(-45deg, #ff9ecf, #ffc2e2, #ff85c1, #ffb6d9);
    background-size: 400% 400%;
    animation: gradient 12s ease infinite;
}

@keyframes gradient {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.container {
    z-index: 2;
    max-width: 90%;
    animation: fadeIn 2s ease-in-out;
}

h1 {
    font-size: 2.3em;
    margin-bottom: 10px;
}

#frase {
    font-size: 1.2em;
    margin-bottom: 15px;
    min-height: 40px;
}

#contador {
    font-size: 1.1em;
    margin-bottom: 20px;
}

button {
    background: white;
    color: #ff4fa3;
    border: none;
    padding: 10px 20px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 1em;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
}

#mensagemSecreta {
    display: none;
    margin-top: 15px;
    font-size: 1.1em;
    animation: fadeIn 2s;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

.heart {
    position: absolute;
    color: rgba(255,255,255,0.7);
    font-size: 20px;
    animation: float 6s linear infinite;
}

@keyframes float {
    0% { transform: translateY(100vh); opacity: 0; }
    10% { opacity: 1; }
    100% { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<div class="container">
    <h1>Geovana ❤️ Felipe</h1>
    <div id="frase"></div>
    <div id="contador"></div>
    <button onclick="mostrarMensagem()">Clique aqui 💌</button>
    <div id="mensagemSecreta">
        Geovana, você é a melhor parte dos meus dias.  
        Obrigado por existir. 💖  
        Eu te amo infinitamente.
    </div>
</div>

<audio id="musica" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

<script>
const texto = "Desde que você entrou na minha vida, tudo ficou mais bonito ✨";
let i = 0;

function escreverTexto() {
    if (i < texto.length) {
        document.getElementById("frase").innerHTML += texto.charAt(i);
        i++;
        setTimeout(escreverTexto, 50);
    }
}
escreverTexto();

// DATA DE INÍCIO
const dataInicio = new Date("2022-06-11");

function atualizarContador() {
    const agora = new Date();
    const diferenca = agora - dataInicio;

    const dias = Math.floor(diferenca / (1000 * 60 * 60 * 24));
    const horas = Math.floor((diferenca / (1000 * 60 * 60)) % 24);
    const minutos = Math.floor((diferenca / (1000 * 60)) % 60);
    const segundos = Math.floor((diferenca / 1000) % 60);

    document.getElementById("contador").innerHTML =
        `Estamos juntos há <br><strong>${dias} dias, ${horas} horas, ${minutos} minutos e ${segundos} segundos 💕</strong>`;
}

setInterval(atualizarContador, 1000);
atualizarContador();

function criarCoracao() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 15) + "px";
    heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
    document.body.appendChild(heart);
    setTimeout(() => { heart.remove(); }, 6000);
}

setInterval(criarCoracao, 300);

function mostrarMensagem() {
    document.getElementById("mensagemSecreta").style.display = "block";
    document.getElementById("musica").play();
}
</script>

</body>
</html>
