     
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Geovana</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #1a1a1a; /* Fundo escuro para contraste profissional */
            --envelope-color: #f3f3f3;
            --envelope-flap: #e0e0e0;
            --text-color: #333;
            --accent: #ff3385;
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-color);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        /* Container do Envelope */
        .wrapper {
            position: relative;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .wrapper:hover {
            transform: scale(1.05);
        }

        .envelope {
            position: relative;
            width: 300px;
            height: 200px;
            background-color: var(--envelope-color);
            border-bottom-left-radius: 10px;
            border-bottom-right-radius: 10px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        /* Aba do envelope */
        .envelope::before {
            content: "";
            position: absolute;
            top: 0;
            z-index: 2;
            border-top: 110px solid var(--envelope-flap);
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            transform-origin: top;
            transition: transform 0.5s 0.3s;
        }

        /* Lados do envelope */
        .envelope::after {
            content: "";
            position: absolute;
            z-index: 2;
            width: 0;
            height: 0;
            border-top: 100px solid transparent;
            border-right: 150px solid var(--envelope-color);
            border-bottom: 100px solid var(--envelope-color);
            border-left: 150px solid var(--envelope-color);
            border-bottom-left-radius: 10px;
            border-bottom-right-radius: 10px;
        }

        /* A Carta (dentro do envelope) */
        .letter {
            position: absolute;
            bottom: 0;
            left: 10px;
            width: 280px;
            height: 180px;
            background: white;
            padding: 20px;
            text-align: center;
            transition: transform 0.6s;
            z-index: 1;
            box-sizing: border-box;
            border-radius: 5px;
        }

        .letter h1 {
            font-family: 'Dancing Script', cursive;
            color: var(--accent);
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .letter p {
            font-size: 0.85rem;
            line-height: 1.5;
            color: var(--text-color);
        }

        /* Animação de Abrir */
        .wrapper.open .envelope::before {
            transform: rotateX(180deg);
            z-index: 0;
        }

        .wrapper.open .letter {
            transform: translateY(-130px);
            height: auto;
            min-height: 250px;
            z-index: 3;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        /* Contador (Aparece após abrir) */
        .timer-container {
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px dashed #ddd;
            opacity: 0;
            transition: opacity 0.5s 0.6s;
        }

        .wrapper.open .timer-container {
            opacity: 1;
        }

        #timer {
            font-weight: 600;
            color: var(--accent);
            font-size: 0.8rem;
        }

        .click-hint {
            position: absolute;
            bottom: -40px;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 0.8rem;
            letter-spacing: 1px;
            opacity: 0.7;
        }
    </style>
</head>

                    <div id="timer">0000d 00h 00m 00s</div>
                </div>
            </div>
        </div>
        <div class="click-hint">CLIQUE PARA ABRIR</div>
    </div>
